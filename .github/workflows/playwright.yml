name: Playwright Tests
on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SAUCEDEMO_BASE_URL: ${{ vars.SAUCEDEMO_BASE_URL }}
      SAUCEDEMO_USER_STANDARD: ${{ vars.SAUCEDEMO_USER_STANDARD }}
      SAUCEDEMO_USER_LOCKED_OUT: ${{ vars.SAUCEDEMO_USER_LOCKED_OUT }}
      SAUCEDEMO_USER_PROBLEM: ${{ vars.SAUCEDEMO_USER_PROBLEM }}
      SAUCEDEMO_USER_PERFORMANCE_GLITCH: ${{ vars.SAUCEDEMO_USER_PERFORMANCE_GLITCH }}
      SAUCEDEMO_USER_ERROR: ${{ vars.SAUCEDEMO_USER_ERROR }}
      SAUCEDEMO_USER_VISUAL: ${{ vars.SAUCEDEMO_USER_VISUAL }}
      SAUCEDEMO_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}
      SAUCEDEMO_PASSWORD_INVALID: ${{ secrets.SAUCEDEMO_PASSWORD_INVALID }}
      SAUCEDEMO_PERF_THRESHOLD_MS: ${{ vars.SAUCEDEMO_PERF_THRESHOLD_MS }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      continue-on-error: true
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14
    - name: Upload JUnit results artifact
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: junit-report
        path: results/junit-report.xml
        retention-days: 14

    # ── Xray Import ──────────────────────────────────────
    - name: Authenticate with Xray Cloud
      if: ${{ !cancelled() }}
      id: xray-auth
      run: |
        TOKEN=$(curl -s -X POST \
          "https://xray.cloud.eu.getxray.app/api/v2/authenticate" \
          -H "Content-Type: application/json" \
          -d "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}" \
          | tr -d '"')
        echo "::add-mask::$TOKEN"
        echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

    - name: Import results to Xray
      if: ${{ !cancelled() && steps.xray-auth.outputs.token != '' }}
      run: |
        curl -s -X POST \
          "https://xray.cloud.eu.getxray.app/api/v2/import/execution/junit?projectKey=RQT&testPlanKey=RQT-1" \
          -H "Content-Type: application/xml" \
          -H "Authorization: Bearer ${{ steps.xray-auth.outputs.token }}" \
          -d @results/junit-report.xml

  deploy-report:
    name: Deploy Playwright Report to Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Configure GitHub Pages
      uses: actions/configure-pages@v5
    - name: Download Playwright report artifact
      uses: actions/download-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
    - name: "Guard: verify Playwright HTML report exists"
      run: |
        if [ ! -f "playwright-report/index.html" ]; then
          echo "Expected playwright-report/index.html but it was not found."
          echo "Contents of playwright-report directory:"
          ls -la playwright-report || true
          exit 1
        fi
    - name: Upload Playwright report for Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: playwright-report/
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4